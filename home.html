<script>
  const user = JSON.parse(localStorage.getItem("currentUser"));
  if (user && user.name) {
    document.getElementById("userName").innerText = user.name;
  }
 
/* ===============================
   USER NAME
================================ */



if (user && user.name) {
  document.getElementById("userName").innerText = user.name;
}

/* ===============================
   CLOCK SETUP
================================ */

const canvas = document.getElementById("clockCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.height / 2;

ctx.translate(radius, radius);

/* ===============================
   LOAD 1.png → 12.png
================================ */

const icons = [];

for (let i = 1; i <= 12; i++) {
  icons.push(`${i}.png`);
}

const loadedIcons = [];

icons.forEach(src => {
  const img = new Image();
  img.src = src;
  loadedIcons.push(img);
});

/* ===============================
   RUN CLOCK
================================ */

setInterval(drawClock, 1000);

function drawClock() {
  ctx.clearRect(-radius, -radius, canvas.width, canvas.height);

  drawFace();
  drawIcons();
  drawTime();
}

/* ===============================
   CLOCK FACE
================================ */

function drawFace() {
  ctx.beginPath();
  ctx.arc(0, 0, radius * 0.9, 0, 2 * Math.PI);
  ctx.fillStyle = "#ffffff";
  ctx.fill();

  ctx.lineWidth = 4;
  ctx.strokeStyle = "#6c63ff";
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, 2 * Math.PI);
  ctx.fillStyle = "#6c63ff";
  ctx.fill();
}

/* ===============================
   DRAW ICONS (1–12)
================================ */

function drawIcons() {
  for (let num = 1; num <= 12; num++) {

    let ang = num * Math.PI / 6;

    let x = radius * 0.7 * Math.sin(ang);
    let y = -radius * 0.7 * Math.cos(ang);

    const img = loadedIcons[num - 1];

    ctx.drawImage(img, x - 15, y - 15, 30, 30);
  }
}

/* ===============================
   TIME HANDS
================================ */

function drawTime() {

  const now = new Date();

  let hour = now.getHours();
  let minute = now.getMinutes();
  let second = now.getSeconds();

  hour = hour % 12;

  hour = (hour * Math.PI / 6) +
         (minute * Math.PI / (6 * 60)) +
         (second * Math.PI / (360 * 60));

  drawHand(hour, radius * 0.4, 6);

  minute = (minute * Math.PI / 30) +
           (second * Math.PI / (30 * 60));

  drawHand(minute, radius * 0.6, 4);

  second = (second * Math.PI / 30);

  drawHand(second, radius * 0.7, 2, "red");
}

/* ===============================
   DRAW HAND
================================ */

function drawHand(pos, length, width, color = "#333") {

  ctx.beginPath();
  ctx.lineWidth = width;
  ctx.lineCap = "round";
  ctx.strokeStyle = color;

  ctx.moveTo(0, 0);

  ctx.rotate(pos);
  ctx.lineTo(0, -length);
  ctx.stroke();
  ctx.rotate(-pos);
}

</script>
