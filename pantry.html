<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Pantry – Skincare Products</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-badge">pd</span>
        <span class="logo-text">personalDock</span>
      </div>

      <nav class="menu">
        <a href="planner.html">
          <span>⬅ Planner</span>
        </a>
        <a href="pantry.html" class="active">
          <span>🧴 Pantry</span>
        </a>
        <a href="timetable.html">
          <span>🕒 Timetable</span>
        </a>
        <a href="attendance.html">
          <span>✅ Attendance</span>
        </a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main content">

      <div class="header">
        <div>
          <h1>🧴 Pantry</h1>
          <p>Manage all skincare products you own.</p>
        </div>
      </div>

      <!-- ADD PRODUCT CARD -->
      <section class="card">
        <h3>Add Product</h3>

        <input type="text" id="productName" placeholder="Product Name" /><br><br>

        <select id="productCategory">
          <option>Select Category</option>
          <option>Cleanser</option>
          <option>Toner</option>
          <option>Serum</option>
          <option>Moisturizer</option>
          <option>Sunscreen</option>
        </select><br><br>

        <input type="date" id="expiryDate" /><br><br>

        <button class="primary-btn" id="addProductBtn" type="button">
          Add Product
        </button>
      </section>

      <!-- PRODUCT LIST CARD -->
      <section class="card">
        <h3>Your Products</h3>

        <table class="product-table">
          <thead>
            <tr>
              <th>Product Name</th>
              <th>Category</th>
              <th>Expiry Date</th>
              <th>Usage</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="productTableBody"></tbody>
        </table>
      </section>

    </main>
  </div>

  <script>

    /* ===============================
       ELEMENT REFERENCES
    ================================ */

    const productNameInput = document.getElementById("productName");
    const productCategorySelect = document.getElementById("productCategory");
    const expiryDateInput = document.getElementById("expiryDate");
    const addProductBtn = document.getElementById("addProductBtn");
    const user = JSON.parse(localStorage.getItem("currentUser"));
    /* ===============================
       LOAD PRODUCTS FROM DATABASE
    ================================ */

    function loadProducts() {

      fetch(`https://personaldock.onrender.com/products?userId=${user._id}`)
        .then(res => res.json())
        .then(products => {

          const tbody = document.getElementById("productTableBody");
          tbody.innerHTML = "";

          const today = new Date();

          products.forEach(product => {

            const expiryDate = new Date(product.expiry);
            const isExpired = expiryDate < today;
            const daysLeft = Math.ceil((expiryDate - today) / (1000 * 60 * 60 * 24));

            const row = document.createElement("tr");

            row.innerHTML = `
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.expiry}</td>
          <td>Daily</td>
          <td>
             ${
              daysLeft < 0
                ? "Expired ❌"
                : daysLeft <= 5
                ? "Expiring soon ⚠️"
                : "Good ✅"
             }
          </td>
          <td>
            <button class="delete-btn">🗑</button>
          </td>
        `;

            row.querySelector(".delete-btn").addEventListener("click", function () {

              fetch("https://personaldock.onrender.com/products/delete", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
  name: product.name,
  userId: user._id   // ⭐ ADD THIS
})
              })
                .then(() => loadProducts());

            });

            tbody.appendChild(row);

          });

        });

    }

    loadProducts();

    /* ===============================
       ADD PRODUCT
    ================================ */

    addProductBtn.addEventListener("click", function () {

      const name = productNameInput.value.trim();
      const category = productCategorySelect.value;
      const expiry = expiryDateInput.value;

      if (!name || category === "Select Category") {
        alert("Please enter product name and select category");
        return;
      }

      const product = {
  name,
  category,
  expiry,
  userId: user._id   //  ADD
};

      fetch("https://personaldock.onrender.com/products", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(product)
      })
        .then(() => {

          loadProducts();

          productNameInput.value = "";
          productCategorySelect.value = "Select Category";
          expiryDateInput.value = "";

        });

    });

    /* ===============================
       USER NAME DISPLAY
    ================================ */

    

    if (user && user.name) {
      document.getElementById("userName").innerText = user.name;
    }

  </script>
</body>

</html>
