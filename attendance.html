<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Attendance – Routine Tracking</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-badge">pd</span>
        <span class="logo-text">personalDock</span>
      </div>

      <nav class="menu">
        <a href="planner.html">
          <span>⬅ Planner</span>
        </a>
        <a href="pantry.html">
          <span>🧴 Pantry</span>
        </a>
        <a href="timetable.html">
          <span>🕒 Timetable</span>
        </a>
        <a href="attendance.html" class="active">
          <span>✅ Attendance</span>
        </a>
      </nav>
    </aside>

    <!-- MAIN -->
    <main class="main content">
      <div class="header">
        <div>
          <h1>✅ Attendance</h1>
          <p>Track whether you are following your routine.</p>
        </div>
      </div>

      <section class="card">
        <h3>Today's Routine</h3>

        <div id="attendanceList"></div>

        <button class="primary-btn" id="saveAttendanceBtn">
          Save Attendance
        </button>
      </section>

    </main>
  </div>
  <script>

const attendanceList = document.getElementById("attendanceList");
const saveAttendanceBtn = document.getElementById("saveAttendanceBtn");

const user = JSON.parse(localStorage.getItem("currentUser"));

if (!user) {
  alert("Please login first");
  window.location.href = "index.html";
}

const today = new Date().toISOString().split("T")[0];

let routine = {
  Morning: [],
  Afternoon: [],
  Night: []
};

/* ===============================
   STEP 1 — LOAD ROUTINE FROM PLANNER
================================ */

fetch(`https://personaldock.onrender.com/planner?userId=${user._id}`)
  .then(res => res.json())
  .then(data => {

    data.forEach(item => {
      routine[item.time].push(item.product);
    });

    renderAttendance();   // ⭐ render first

    loadSavedAttendance(); // ⭐ then restore

  });

/* ===============================
   STEP 2 — RENDER CHECKBOXES
================================ */

function renderAttendance() {

  attendanceList.innerHTML = "";

  Object.keys(routine).forEach(time => {

    if (routine[time].length === 0) return;

    const block = document.createElement("div");

    block.innerHTML = `<h4>${time}</h4>`;

    routine[time].forEach(item => {

      block.innerHTML += `
        <label>
          <input type="checkbox"
                 class="att-check"
                 data-time="${time}"
                 data-product="${item}">
          ${item}
        </label><br>
      `;

    });

    attendanceList.appendChild(block);

  });

}

/* ===============================
   STEP 3 — LOAD SAVED ATTENDANCE
================================ */

function loadSavedAttendance() {

  fetch(`https://personaldock.onrender.com?userId=${user._id}`)
    .then(res => res.json())
    .then(data => {

      data.forEach(item => {

        if (item.date !== today) return;

        const selector = `[data-product="${item.product}"][data-time="${item.time}"]`;

        const checkbox = document.querySelector(selector);

        if (checkbox) {
          checkbox.checked = item.completed;
        }

      });

    });

}

/* ===============================
   STEP 4 — SAVE ATTENDANCE
================================ */

saveAttendanceBtn.addEventListener("click", function () {

  const records = [];

  document.querySelectorAll(".att-check").forEach(cb => {

    records.push({
      product: cb.dataset.product,
      time: cb.dataset.time,
      date: today,
      completed: cb.checked,
      userId: user._id
    });

  });

  fetch("https://personaldock.onrender.com/attendance", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(records)
  })
    .then(res => res.json())
    .then(() => {
      alert("Attendance saved for today ✅");
    });

});

</script>
</body>

</html>
