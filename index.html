<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Login | personalDock</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #dbeafe, #fce7f3);
      font-family: Arial, sans-serif;
    }

    .auth-box {
      width: 360px;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
      text-align: center;
    }

    .logo {
      margin-bottom: 15px;
    }

    .logo-badge {
      background: #2563eb;
      color: #fff;
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: bold;
    }

    h2 {
      margin-bottom: 6px;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      margin-top: 10px;
    }

    .switch {
      margin-top: 15px;
      font-size: 14px;
      color: #2563eb;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="auth-box">
    <div class="logo">
      <span class="logo-badge">pd</span>
      <strong> personalDock</strong>
    </div>

    <h2 id="title">Login</h2>
    <p id="subtitle">Welcome back 👋</p>

    <input type="text" id="name" placeholder="Your Name" />
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />

    <button class="primary-btn" id="authBtn">Login</button>

    <div class="switch" id="switchMode">
      Don’t have an account? Sign up
    </div>
  </div>

  <script>

const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const authBtn = document.getElementById("authBtn");
const switchMode = document.getElementById("switchMode");

const nameInput = document.getElementById("name");
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");

let isLogin = true;

/* ===============================
   SWITCH LOGIN / SIGNUP
================================ */

switchMode.onclick = () => {

  isLogin = !isLogin;

  if (isLogin) {
    title.innerText = "Login";
    subtitle.innerText = "Welcome back 👋";
    authBtn.innerText = "Login";
    switchMode.innerText = "Don’t have an account? Sign up";
  } else {
    title.innerText = "Sign Up";
    subtitle.innerText = "Create your personalDock account";
    authBtn.innerText = "Sign Up";
    switchMode.innerText = "Already have an account? Login";
  }

};


/* ===============================
   AUTH BUTTON
================================ */

authBtn.onclick = () => {

  console.log("BUTTON CLICKED ✅");

  if (isLogin) {

    // LOGIN
    fetch("https://personaldock.onrender.com/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username: usernameInput.value,
        password: passwordInput.value
      })
    })
    .then(res => res.json())
    .then(data => {

      console.log("LOGIN RESPONSE:", data);

      if (!data.success) {
        alert("Invalid credentials ❌");
        return;
      }

      localStorage.setItem("currentUser", JSON.stringify(data.user));
      window.location.href = "home.html";

    })
    .catch(err => {
      console.error("LOGIN ERROR:", err);
    });

  } else {

    // SIGNUP
    fetch("https://personaldock.onrender.com/signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: nameInput.value,
        username: usernameInput.value,
        password: passwordInput.value
      })
    })
    .then(res => res.json())
    .then(data => {

      console.log("SIGNUP RESPONSE:", data);

      if (!data.success) {
        alert("User already exists ❌");
        return;
      }

      alert("Signup successful ✅ Please login");

      localStorage.removeItem("currentUser");

    })
    .catch(err => {
      console.error("SIGNUP ERROR:", err);
    });

  }

};

</script>
</body>

</html>
